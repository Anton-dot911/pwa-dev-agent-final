<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Офлайн — PWA Dev Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #BECAE1;
      --sd: #a0b3cb;
      --sl: #d6e4f7;
      --t: #3a4a5c;
      --ac: #5b8fc9;
    }
    body {
      background: var(--bg);
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      color: var(--t);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }
    .card {
      background: var(--bg);
      border-radius: 24px;
      box-shadow: 10px 10px 24px var(--sd), -10px -10px 24px var(--sl);
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .desc { font-size: 14px; color: #7a90a8; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 700;
      color: var(--ac);
      box-shadow: 6px 6px 14px var(--sd), -6px -6px 14px var(--sl);
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🤖</div>
    <div class="title">Ти офлайн</div>
    <div class="desc">
      PWA Dev Agent потребує з'єднання для роботи з Claude API.<br><br>
      Перевір інтернет і спробуй ще раз.
    </div>
    <a href="/" class="btn">↺ Спробувати знову</a>
  </div>
</body>
</html>
